global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alert_rules.yml

scrape_configs:
  - job_name: 'muserock-api'
    scrape_interval: 15s
    static_configs:
      - targets: ['api:3000']
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  - job_name: 'muserock-health'
    scrape_interval: 30s
    static_configs:
      - targets: ['api:3000']
    metrics_path: '/health'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance